<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamil Nadu 2026 Elections Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue-dark: #0a1628;
  --blue-mid: #0d2145;
  --blue-bright: #1565c0;
  --blue-accent: #1976d2;
  --blue-light: #1e88e5;
  --blue-glow: #42a5f5;
  --white: #ffffff;
  --white-95: rgba(255,255,255,0.95);
  --white-80: rgba(255,255,255,0.8);
  --white-20: rgba(255,255,255,0.2);
  --white-10: rgba(255,255,255,0.1);
  --gold: #ffd600;
  --gold-light: #ffee58;
  --text-dark: #0a1628;
  --text-mid: #1a3055;
  --green: #00c853;
  --red: #d32f2f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--blue-dark);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── HEADER ─────────────────────────────────── */
.header {
  background: linear-gradient(135deg, #0a1628 0%, #0d2145 40%, #1565c0 100%);
  border-bottom: 3px solid var(--gold);
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 4px 30px rgba(21,101,192,0.5);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  gap: 16px;
  flex-wrap: wrap;
}
.header-title {
  display: flex;
  flex-direction: column;
}
.header-title .main-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--white);
  text-transform: uppercase;
  line-height: 1;
}
.header-title .sub-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 4px;
  color: var(--gold);
  text-transform: uppercase;
  margin-top: 3px;
}
.header-badge {
  background: var(--gold);
  color: var(--blue-dark);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 13px;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ─── TABS ─────────────────────────────────── */
.tabs-bar {
  background: var(--blue-mid);
  border-bottom: 2px solid rgba(255,255,255,0.1);
  padding: 0 24px;
  display: flex;
  gap: 0;
}
.tabs-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
}
.tab-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--white-80);
  background: transparent;
  border: none;
  padding: 14px 32px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tab-btn:hover { color: var(--white); background: var(--white-10); }
.tab-btn.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
  background: rgba(255,214,0,0.08);
}
.tab-btn .tab-icon { font-size: 18px; }

/* ─── MAIN CONTENT ─────────────────────────────── */
.page { display: none; }
.page.active { display: block; }
.content-wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
}

/* ─── STATS BAR ─────────────────────────────── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: linear-gradient(135deg, var(--blue-mid), var(--blue-bright));
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 16px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--gold);
}
.stat-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 32px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
}
.stat-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--white-80);
  margin-top: 4px;
}

/* ─── SEARCH & FILTERS ─────────────────────────── */
.search-row {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.search-input-wrap {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-input-wrap .search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  color: var(--blue-glow);
}
.search-input {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  padding: 11px 14px 11px 44px;
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--blue-glow); }
.search-input::placeholder { color: var(--white-80); }
.filter-select {
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  padding: 11px 16px;
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  font-weight: 600;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}
.filter-select:focus { border-color: var(--blue-glow); }
.filter-select option { background: var(--blue-mid); color: var(--white); }
.results-count {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--white-80);
  white-space: nowrap;
}

/* ─── CONSTITUENCY GRID (Page 1) ─────────────────── */
.constituency-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}
.const-card {
  background: linear-gradient(160deg, rgba(13,33,69,0.95) 0%, rgba(21,101,192,0.25) 100%);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.const-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(21,101,192,0.5);
  border-color: rgba(255,214,0,0.4);
}
.const-card-header {
  background: linear-gradient(90deg, var(--blue-bright) 0%, var(--blue-light) 100%);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.const-number {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--gold);
  background: rgba(0,0,0,0.3);
  padding: 2px 8px;
  border-radius: 4px;
}
.const-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.5px;
  color: var(--white);
  flex: 1;
  text-transform: uppercase;
}
.const-winner-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,0,0,0.35);
  border-radius: 20px;
  padding: 3px 8px 3px 3px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--white-95);
  text-transform: uppercase;
  white-space: nowrap;
}
.winner-flag {
  width: 22px;
  height: 15px;
  object-fit: cover;
  border-radius: 2px;
}
.const-card-body { padding: 14px 16px; }

/* Voter row */
.voter-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.voter-item {
  text-align: center;
  background: rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 7px 4px;
}
.voter-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px;
  font-weight: 800;
  color: var(--blue-glow);
  line-height: 1;
}
.voter-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--white-80);
  margin-top: 2px;
}
.voter-item.total .voter-num { color: var(--gold); font-size: 20px; }

/* Candidates section */
.cands-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cands-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,214,0,0.3);
}
.cands-list { display: flex; flex-direction: column; gap: 5px; }
.cand-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 7px;
  padding: 6px 10px;
  border-left: 3px solid transparent;
  transition: background 0.15s;
}
.cand-row:hover { background: rgba(255,255,255,0.1); }
.cand-party-flag {
  width: 28px;
  height: 19px;
  object-fit: cover;
  border-radius: 3px;
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.cand-party-dot {
  width: 28px;
  height: 19px;
  border-radius: 3px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  font-weight: 900;
  color: white;
  letter-spacing: 0.5px;
}
.cand-party-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 1px;
  color: var(--white-80);
  min-width: 60px;
  flex-shrink: 0;
}
.cand-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--white);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* 2021 mini-result in card */
.result-2021-mini {
  margin-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.result-label-small {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--white-80);
  text-transform: uppercase;
}
.result-winner-small {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  flex: 1;
}
.result-votes-small {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--green);
}

/* ─── PAGE 2: RESULTS TABLE ─────────────────────── */
.results-table-wrap {
  background: rgba(13,33,69,0.8);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  overflow: hidden;
}
.results-table {
  width: 100%;
  border-collapse: collapse;
}
.results-table th {
  background: linear-gradient(90deg, var(--blue-bright), var(--blue-light));
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--white);
  padding: 14px 16px;
  text-align: left;
  border-bottom: 2px solid var(--gold);
  white-space: nowrap;
}
.results-table th:first-child { padding-left: 20px; }
.results-table td {
  padding: 11px 16px;
  font-size: 14px;
  color: var(--white);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  vertical-align: middle;
}
.results-table td:first-child { padding-left: 20px; }
.results-table tr:hover td { background: rgba(255,255,255,0.05); }
.results-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
.results-table tr:nth-child(even):hover td { background: rgba(255,255,255,0.07); }

.ac-no-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 800;
  color: var(--gold);
  background: rgba(255,214,0,0.12);
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 1px;
}
.const-name-td {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.5px;
}
.winner-td {
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
}
.party-cell {
  display: flex;
  align-items: center;
  gap: 8px;
}
.party-flag-sm {
  width: 30px;
  height: 20px;
  object-fit: cover;
  border-radius: 3px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.party-name-sm {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 1px;
  color: var(--white);
}
.votes-td {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--blue-glow);
}
.polled-td {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--white-80);
}
.party-color-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
}

/* WIN badge */
.win-badge {
  background: linear-gradient(90deg, #00c853, #00e676);
  color: #003300;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  padding: 2px 8px;
  border-radius: 4px;
}

/* ─── MODAL ─────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 9000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: linear-gradient(160deg, #0d2145 0%, #0a1628 100%);
  border: 2px solid var(--blue-bright);
  border-radius: 18px;
  width: 100%;
  max-width: 680px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,0.8), 0 0 60px rgba(21,101,192,0.3);
}
.modal-header {
  background: linear-gradient(90deg, var(--blue-bright) 0%, var(--blue-light) 100%);
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-radius: 16px 16px 0 0;
  border-bottom: 2px solid var(--gold);
}
.modal-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--white);
}
.modal-ac {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--gold);
  margin-top: 2px;
}
.modal-close {
  background: rgba(255,255,255,0.2);
  border: none;
  color: var(--white);
  font-size: 22px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.modal-close:hover { background: rgba(255,255,255,0.4); }
.modal-body { padding: 24px; }

.modal-section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-section-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,214,0,0.25); }
.modal-section { margin-bottom: 24px; }

.voter-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 4px;
}
.voter-box {
  background: linear-gradient(135deg, rgba(21,101,192,0.3), rgba(21,101,192,0.1));
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 14px 10px;
  text-align: center;
}
.voter-box.total-box {
  background: linear-gradient(135deg, rgba(255,214,0,0.2), rgba(255,214,0,0.05));
  border-color: rgba(255,214,0,0.3);
}
.voter-box .vb-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 24px;
  font-weight: 900;
  color: var(--blue-glow);
  line-height: 1;
}
.voter-box.total-box .vb-num { color: var(--gold); font-size: 28px; }
.voter-box .vb-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--white-80);
  margin-top: 4px;
}

.modal-cands-list { display: flex; flex-direction: column; gap: 8px; }
.modal-cand-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 10px 14px;
  border-left: 4px solid var(--blue-bright);
  transition: background 0.15s;
}
.modal-cand-row:hover { background: rgba(255,255,255,0.1); }
.modal-flag {
  width: 36px;
  height: 24px;
  object-fit: cover;
  border-radius: 4px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  flex-shrink: 0;
}
.modal-party-dot {
  width: 36px;
  height: 24px;
  border-radius: 4px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 900;
  color: white;
}
.modal-party-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 1px;
  color: var(--blue-glow);
  min-width: 80px;
  flex-shrink: 0;
}
.modal-cand-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--white);
  flex: 1;
}

/* 2021 result inside modal */
.result-2021-box {
  background: linear-gradient(135deg, rgba(0,200,83,0.12), rgba(0,200,83,0.04));
  border: 1px solid rgba(0,200,83,0.3);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.result-2021-flag { width: 50px; height: 33px; object-fit: cover; border-radius: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); flex-shrink: 0; }
.result-2021-info { flex: 1; }
.result-2021-winner { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; color: var(--white); }
.result-2021-party { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--blue-glow); letter-spacing: 1px; }
.result-2021-votes { text-align: right; }
.result-2021-votes .big-votes { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 900; color: var(--green); }
.result-2021-votes .votes-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--white-80); }

/* Pagination */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.pg-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.pg-btn:hover { background: var(--blue-bright); border-color: var(--blue-bright); }
.pg-btn.active { background: var(--blue-bright); border-color: var(--gold); color: var(--gold); }
.pg-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.pg-info { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; color: var(--white-80); }

/* Party color reference */
.no-result { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; color: var(--white-80); padding: 8px 0; }
</style>
</head>

const DATA = RAW.constituencies;
const FLAGS = RAW.flags;

const PARTY_COLORS = {
  DMK: '#E53935',
  AIADMK: '#1B5E20',
  TVK: '#6A1B9A',
  NTK: '#E65100',
  BJP: '#FF6F00',
  INC: '#1565C0',
  VCK: '#004D40',
  AMMK: '#880E4F',
  DMDK: '#B71C1C',
  PMK: '#1A237E',
  CPIM: '#B71C1C',
  CPI: '#C62828',
};

const PARTY_DISPLAY = {
  'DMK': 'DMK',
  'AIADMK': 'AIADMK',
  'TVK': 'TVK',
  'NTK': 'NTK',
  'BJP(AIADMK)': 'BJP',
  'PMK(AIADMK)': 'PMK',
  'Congress(DMK)': 'INC',
  'VCK(DMK)': 'VCK',
  'AMMK(AIADMK)': 'AMMK',
  'DMDK(DMK)': 'DMDK',
};

function flagImg(party, cls='party-flag-sm') {
  if (FLAGS[party]) return `<img src="${FLAGS[party]}" class="${cls}" alt="${party}">`;
  const color = PARTY_COLORS[party] || '#555';
  return `<div class="party-flag-sm" style="background:${color};border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:900;color:white;letter-spacing:0.5px;">${party.substring(0,3)}</div>`;
}

function fmt(n) { return n ? n.toLocaleString('en-IN') : 'N/A'; }

// ─── PAGE 1 ────────────────────────────
let filteredData1 = [...DATA];
let page1 = 1;
const PER_PAGE1 = 24;

function renderStats1() {
  const totalVoters = DATA.reduce((s,d) => s + (d.voters.total||0), 0);
  document.getElementById('statsBar1').innerHTML = `
    <div class="stat-card"><div class="stat-num">234</div><div class="stat-label">Constituencies</div></div>
    <div class="stat-card"><div class="stat-num">${fmt(totalVoters)}</div><div class="stat-label">Total Voters (SIR)</div></div>
    <div class="stat-card"><div class="stat-num">10</div><div class="stat-label">Parties Contesting</div></div>
    <div class="stat-card"><div class="stat-num">2026</div><div class="stat-label">Election Year</div></div>
  `;
}

function getCandidateFlag(partyKey) {
  const pk = PARTY_DISPLAY[partyKey] || partyKey;
  if (FLAGS[pk]) return `<img src="${FLAGS[pk]}" class="cand-party-flag" alt="${pk}">`;
  const color = PARTY_COLORS[pk] || '#555';
  return `<div class="cand-party-dot" style="background:${color};">${pk.substring(0,3)}</div>`;
}

function renderGrid1() {
  const grid = document.getElementById('constGrid');
  const start = (page1-1)*PER_PAGE1;
  const slice = filteredData1.slice(start, start+PER_PAGE1);
  
  if (slice.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:rgba(255,255,255,0.6);font-family:Barlow Condensed,sans-serif;font-size:22px;font-weight:700;letter-spacing:2px;">NO RESULTS FOUND</div>';
    return;
  }
  
  grid.innerHTML = slice.map(d => {
    const cands = Object.entries(d.candidates_2026);
    const r = d.result_2021;
    const v = d.voters;
    
    const winnerPill = r && r.party ? `
      <div class="const-winner-pill">
        ${flagImg(r.party,'winner-flag')}
        ${r.party}
      </div>` : '';
    
    const voterStrip = v && v.total ? `
      <div class="voter-strip">
        <div class="voter-item"><div class="voter-num">${fmt(v.male)}</div><div class="voter-label">Male</div></div>
        <div class="voter-item"><div class="voter-num">${fmt(v.female)}</div><div class="voter-label">Female</div></div>
        <div class="voter-item"><div class="voter-num">${fmt(v.third_gender)}</div><div class="voter-label">3rd Gender</div></div>
        <div class="voter-item total"><div class="voter-num">${fmt(v.total)}</div><div class="voter-label">Total</div></div>
      </div>` : '';
    
    const candsList = cands.slice(0,5).map(([party,name]) => {
      const pk = PARTY_DISPLAY[party] || party;
      return `<div class="cand-row">
        ${getCandidateFlag(party)}
        <span class="cand-party-tag">${pk}</span>
        <span class="cand-name">${name}</span>
      </div>`;
    }).join('');
    
    const more = cands.length > 5 ? `<div style="font-size:11px;color:rgba(255,255,255,0.5);padding:4px 10px;font-weight:600;">+${cands.length-5} more candidates</div>` : '';
    
    const result2021Mini = r && r.winner ? `
      <div class="result-2021-mini">
        <span class="result-label-small">2021:</span>
        ${flagImg(r.party,'winner-flag')}
        <span class="result-winner-small">${r.winner}</span>
        <span class="result-votes-small">${fmt(r.votes)} votes</span>
      </div>` : '';
    
    return `<div class="const-card" onclick="openModal(${d.ac_no})">
      <div class="const-card-header">
        <span class="const-number">AC ${d.ac_no}</span>
        <span class="const-name">${d.name}</span>
        ${winnerPill}
      </div>
      <div class="const-card-body">
        ${voterStrip}
        <div class="cands-label">2026 Candidates</div>
        <div class="cands-list">${candsList}${more}</div>
        ${result2021Mini}
      </div>
    </div>`;
  }).join('');
}

function renderPagination1() {
  const total = filteredData1.length;
  const pages = Math.ceil(total / PER_PAGE1);
  if (pages <= 1) { document.getElementById('pagination1').innerHTML = ''; return; }
  
  let html = `<button class="pg-btn" onclick="goPage1(${page1-1})" ${page1===1?'disabled':''}>◀ Prev</button>`;
  
  let start = Math.max(1, page1-2), end = Math.min(pages, page1+2);
  if (start > 1) html += `<button class="pg-btn" onclick="goPage1(1)">1</button>${start>2?'<span class="pg-info">…</span>':''}`;
  for (let i=start;i<=end;i++) html += `<button class="pg-btn ${i===page1?'active':''}" onclick="goPage1(${i})">${i}</button>`;
  if (end < pages) html += `${end<pages-1?'<span class="pg-info">…</span>':''}<button class="pg-btn" onclick="goPage1(${pages})">${pages}</button>`;
  
  html += `<button class="pg-btn" onclick="goPage1(${page1+1})" ${page1===pages?'disabled':''}>Next ▶</button>`;
  html += `<span class="pg-info">${page1} / ${pages} (${total} constituencies)</span>`;
  document.getElementById('pagination1').innerHTML = html;
}

function goPage1(p) {
  const pages = Math.ceil(filteredData1.length/PER_PAGE1);
  if (p < 1 || p > pages) return;
  page1 = p;
  renderGrid1();
  renderPagination1();
  window.scrollTo({top:0,behavior:'smooth'});
}

function filterPage1() {
  const q = document.getElementById('search1').value.toLowerCase().trim();
  const party = document.getElementById('filter1Party').value;
  
  filteredData1 = DATA.filter(d => {
    const nameMatch = !q || d.name.toLowerCase().includes(q) ||
      Object.values(d.candidates_2026).some(n => n.toLowerCase().includes(q));
    
    let partyMatch = true;
    if (party) {
      partyMatch = Object.keys(d.candidates_2026).some(pk => {
        const dp = PARTY_DISPLAY[pk] || pk;
        return dp.toLowerCase().includes(party.toLowerCase()) || pk.toLowerCase().includes(party.toLowerCase());
      });
    }
    return nameMatch && partyMatch;
  });
  
  page1 = 1;
  document.getElementById('count1').textContent = `Showing ${filteredData1.length} constituencies`;
  renderGrid1();
  renderPagination1();
}

// ─── PAGE 2 ────────────────────────────
let filteredData2 = [...DATA];
let page2 = 1;
const PER_PAGE2 = 30;

function renderStats2() {
  const dmkWins = DATA.filter(d => d.result_2021.party === 'DMK').length;
  const aiadmkWins = DATA.filter(d => d.result_2021.party === 'AIADMK').length;
  const others = DATA.filter(d => d.result_2021.party && d.result_2021.party !== 'DMK' && d.result_2021.party !== 'AIADMK').length;
  document.getElementById('statsBar2').innerHTML = `
    <div class="stat-card"><div class="stat-num" style="color:#E53935;">${dmkWins}</div><div class="stat-label">DMK Won</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#4caf50;">${aiadmkWins}</div><div class="stat-label">AIADMK Won</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#64b5f6;">${others}</div><div class="stat-label">Others Won</div></div>
    <div class="stat-card"><div class="stat-num">2021</div><div class="stat-label">Election Year</div></div>
  `;
}

function renderTable2() {
  const tbody = document.getElementById('resultsBody');
  const start = (page2-1)*PER_PAGE2;
  const slice = filteredData2.slice(start, start+PER_PAGE2);
  
  if (slice.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:rgba(255,255,255,0.5);font-family:Barlow Condensed,sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;">NO RESULTS FOUND</td></tr>';
    return;
  }
  
  tbody.innerHTML = slice.map(d => {
    const r = d.result_2021;
    if (!r || !r.winner) return `<tr><td><span class="ac-no-badge">${d.ac_no}</span></td><td class="const-name-td">${d.name}</td><td colspan="4" style="color:rgba(255,255,255,0.4);font-style:italic;">Data not available</td></tr>`;
    
    const flagHtml = FLAGS[r.party] 
      ? `<img src="${FLAGS[r.party]}" class="party-flag-sm" alt="${r.party}">`
      : `<div class="party-flag-sm" style="background:${PARTY_COLORS[r.party]||'#555'};border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:Barlow Condensed,sans-serif;font-size:7px;font-weight:900;color:white;">${r.party.substring(0,3)}</div>`;
    
    const pct = r.total_polled ? ((r.votes/r.total_polled)*100).toFixed(1) : '';
    
    return `<tr onclick="openModal(${d.ac_no})" style="cursor:pointer;">
      <td><span class="ac-no-badge">${d.ac_no}</span></td>
      <td class="const-name-td">${d.name}</td>
      <td class="winner-td">${r.winner}</td>
      <td><div class="party-cell">${flagHtml}<span class="party-name-sm">${r.party}</span></div></td>
      <td class="votes-td">${fmt(r.votes)} ${pct?`<span style="font-size:11px;color:rgba(255,255,255,0.5);font-weight:500;">(${pct}%)</span>`:''}</td>
      <td class="polled-td">${fmt(r.total_polled)}</td>
    </tr>`;
  }).join('');
}

function renderPagination2() {
  const total = filteredData2.length;
  const pages = Math.ceil(total/PER_PAGE2);
  if (pages <= 1) { document.getElementById('pagination2').innerHTML = ''; return; }
  
  let html = `<button class="pg-btn" onclick="goPage2(${page2-1})" ${page2===1?'disabled':''}>◀ Prev</button>`;
  let start = Math.max(1, page2-2), end = Math.min(pages, page2+2);
  if (start > 1) html += `<button class="pg-btn" onclick="goPage2(1)">1</button>${start>2?'<span class="pg-info">…</span>':''}`;
  for (let i=start;i<=end;i++) html += `<button class="pg-btn ${i===page2?'active':''}" onclick="goPage2(${i})">${i}</button>`;
  if (end < pages) html += `${end<pages-1?'<span class="pg-info">…</span>':''}<button class="pg-btn" onclick="goPage2(${pages})">${pages}</button>`;
  html += `<button class="pg-btn" onclick="goPage2(${page2+1})" ${page2===pages?'disabled':''}>Next ▶</button>`;
  html += `<span class="pg-info">${page2} / ${pages} (${total} results)</span>`;
  document.getElementById('pagination2').innerHTML = html;
}

function goPage2(p) {
  const pages = Math.ceil(filteredData2.length/PER_PAGE2);
  if (p < 1 || p > pages) return;
  page2 = p;
  renderTable2();
  renderPagination2();
  window.scrollTo({top:0,behavior:'smooth'});
}

function filterPage2() {
  const q = document.getElementById('search2').value.toLowerCase().trim();
  const party = document.getElementById('filter2Party').value;
  filteredData2 = DATA.filter(d => {
    const r = d.result_2021;
    const nameMatch = !q || d.name.toLowerCase().includes(q) || (r.winner && r.winner.toLowerCase().includes(q));
    const partyMatch = !party || (r.party && r.party === party);
    return nameMatch && partyMatch;
  });
  page2 = 1;
  document.getElementById('count2').textContent = `Showing ${filteredData2.length} results`;
  renderTable2();
  renderPagination2();
}

// ─── MODAL ────────────────────────────
function openModal(acNo) {
  const d = DATA.find(x => x.ac_no === acNo);
  if (!d) return;
  
  document.getElementById('modalTitle').textContent = d.name;
  document.getElementById('modalAC').textContent = `AC No. ${d.ac_no} · Assembly Constituency`;
  
  const v = d.voters;
  const r = d.result_2021;
  const cands = Object.entries(d.candidates_2026);
  
  const voterSection = v && v.total ? `
    <div class="modal-section">
      <div class="modal-section-title">📊 2026 SIR Voter Data</div>
      <div class="voter-grid">
        <div class="voter-box"><div class="vb-num">${fmt(v.male)}</div><div class="vb-label">Male</div></div>
        <div class="voter-box"><div class="vb-num">${fmt(v.female)}</div><div class="vb-label">Female</div></div>
        <div class="voter-box"><div class="vb-num">${fmt(v.third_gender)}</div><div class="vb-label">3rd Gender</div></div>
        <div class="voter-box total-box"><div class="vb-num">${fmt(v.total)}</div><div class="vb-label">Total Voters</div></div>
      </div>
    </div>` : '';
  
  const candsSection = cands.length ? `
    <div class="modal-section">
      <div class="modal-section-title">🏛️ 2026 Contesting Candidates</div>
      <div class="modal-cands-list">${cands.map(([party,name]) => {
        const pk = PARTY_DISPLAY[party] || party;
        const flagEl = FLAGS[pk] 
          ? `<img src="${FLAGS[pk]}" class="modal-flag" alt="${pk}">`
          : `<div class="modal-party-dot" style="background:${PARTY_COLORS[pk]||'#555'};">${pk.substring(0,3)}</div>`;
        return `<div class="modal-cand-row" style="border-left-color:${PARTY_COLORS[pk]||'#1565c0'};">
          ${flagEl}
          <span class="modal-party-name">${pk}</span>
          <span class="modal-cand-name">${name}</span>
        </div>`;
      }).join('')}</div>
    </div>` : '';
  
  const resultSection = r && r.winner ? `
    <div class="modal-section">
      <div class="modal-section-title">🏆 2021 Election Result</div>
      <div class="result-2021-box">
        ${FLAGS[r.party] ? `<img src="${FLAGS[r.party]}" class="result-2021-flag" alt="${r.party}">` : ''}
        <div class="result-2021-info">
          <div class="result-2021-winner">${r.winner}</div>
          <div class="result-2021-party">${r.party} · ${r.party_name}</div>
        </div>
        <div class="result-2021-votes">
          <div class="big-votes">${fmt(r.votes)}</div>
          <div class="votes-label">Votes Won</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px;">of ${fmt(r.total_polled)} polled</div>
        </div>
      </div>
    </div>` : '';
  
  document.getElementById('modalBody').innerHTML = voterSection + candsSection + resultSection;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// ─── TAB SWITCH ────────────────────────
function switchTab(n) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page${n}`).classList.add('active');
  document.getElementById(`tab${n}`).classList.add('active');
}

// ─── INIT ────────────────────────────
renderStats1();
filterPage1();
renderStats2();
filterPage2();
</script>
</body>
</html>
